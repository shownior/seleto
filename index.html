<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- =====================================================
       SELETO — Plataforma de Streaming
       Página: Login (index.html)
  ====================================================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>SELETO — Acesse Agora</title>
  <meta name="description" content="Faça login na SELETO, sua plataforma de streaming premium com filmes exclusivos em qualidade cinematográfica." />
  <meta name="theme-color" content="#0a0202" />

  <!-- Open Graph -->
  <meta property="og:title"       content="SELETO — Streaming Premium" />
  <meta property="og:description" content="Cinema de alto nível, sob demanda." />
  <meta property="og:type"        content="website" />

  <!-- Favicon inline (SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">

  <!-- ── Orbs decorativos de fundo ── -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <!-- ── Card de Login ── -->
  <main class="login-card glass-panel" role="main">

    <!-- Cabeçalho -->
    <header class="login-header">
      <span class="logo" aria-label="SELETO Streaming">SELETO</span>
      <p>Cinema premium, onde e quando quiser.</p>
    </header>

    <!-- Formulário -->
    <form id="login-form" class="login-form" novalidate aria-label="Formulário de login">

      <!-- Campo E-mail -->
      <div class="input-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          class="input-field"
          placeholder="seu@email.com"
          autocomplete="email"
          spellcheck="false"
          required
        />
      </div>

      <!-- Campo Senha -->
      <div class="input-group">
        <label for="password">Senha</label>
        <div style="position:relative;">
          <input
            type="password"
            id="password"
            name="password"
            class="input-field"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <!-- Toggle mostrar/ocultar senha -->
          <button
            type="button"
            id="toggle-password"
            aria-label="Mostrar senha"
            style="
              position:absolute; right:14px; top:50%;
              transform:translateY(-50%);
              background:none; border:none; cursor:pointer;
              color:var(--text-muted); display:flex; align-items:center;
              padding:4px; transition:color 0.2s;
            "
          >
            <!-- Ícone de olho -->
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Mensagem de erro global -->
      <p id="login-error" class="error-msg" role="alert" aria-live="assertive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span></span>
      </p>

      <!-- Botão de Login -->
      <button type="submit" id="btn-login" class="btn btn-primary">
        <span class="btn-text">Entrar na SELETO</span>
        <div class="btn-loader" aria-hidden="true"></div>
      </button>

    </form><!-- /login-form -->

    <!-- Hint com credenciais de demonstração -->
    <div class="demo-hint" role="note" aria-label="Credenciais de demonstração">
      <p>
        <strong style="color:var(--text-secondary);display:block;margin-bottom:6px;">
          Acesso de demonstração
        </strong>
        E-mail: <code>admin@seleto.com</code><br />
        Senha: <code>123456</code>
      </p>
    </div>

  </main><!-- /login-card -->

  <!-- ── Scripts ── -->
  <!-- auth.js deve ser carregado primeiro; o DOMContentLoaded cuida da inicialização -->
  <script src="assets/js/auth.js"></script>

  <!-- Toggle de visibilidade da senha (script inline mínimo) -->
  <script>
    (function () {
      const btn   = document.getElementById('toggle-password');
      const input = document.getElementById('password');
      if (!btn || !input) return;

      btn.addEventListener('click', () => {
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');

        // Troca o ícone
        const icon = document.getElementById('eye-icon');
        if (icon) {
          icon.innerHTML = isPassword
            ? /* olho fechado */
              `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
               <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
               <line x1="1" y1="1" x2="23" y2="23"/>`
            : /* olho aberto */
              `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
               <circle cx="12" cy="12" r="3"/>`;
        }
      });
    })();
  </script>

</body>
</html>
