<!DOCTYPE html>
<html lang="es">
<head>
  <!-- =====================================================
       SELETO — Plataforma de Streaming
       Página: Login (index.html)
  ====================================================== -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>SELETO — Accede Ahora</title>
  <meta name="description" content="Inicia sesión en SELETO, tu plataforma de streaming premium con películas exclusivas en calidad cinematográfica." />
  <meta name="theme-color" content="#0a0202" />

  <!-- Open Graph -->
  <meta property="og:title"       content="SELETO — Streaming Premium" />
  <meta property="og:description" content="Cine de alto nivel, bajo demanda." />
  <meta property="og:type"        content="website" />

  <!-- Favicon inline (SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">

  <!-- ── Orbs decorativos de fundo ── -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <!-- ── Card de Login ── -->
  <main class="login-card glass-panel" role="main">

    <!-- Cabeçalho -->
    <header class="login-header">
      <a href="index.html" class="logo-link" aria-label="SELETO Streaming">
        <img src="assets/SELETO LOGO.png" alt="SELETO" class="logo-img" />
      </a>
    </header>

    <!-- Formulário -->
    <form id="login-form" class="login-form" novalidate aria-label="Formulario de inicio de sesión">

      <!-- Campo Correo -->
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          class="input-field"
          placeholder="tu@email.com"
          autocomplete="email"
          spellcheck="false"
          required
        />
      </div>

      <!-- Campo Contraseña -->
      <div class="input-group">
        <label for="password">Contraseña</label>
        <div style="position:relative;">
          <input
            type="password"
            id="password"
            name="password"
            class="input-field"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <!-- Toggle mostrar/ocultar contraseña -->
          <button
            type="button"
            id="toggle-password"
            aria-label="Mostrar contraseña"
            style="
              position:absolute; right:14px; top:50%;
              transform:translateY(-50%);
              background:none; border:none; cursor:pointer;
              color:var(--text-muted); display:flex; align-items:center;
              padding:4px; transition:color 0.2s;
            "
          >
            <!-- Ícono de ojo -->
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Mensaje de error global -->
      <p id="login-error" class="error-msg" role="alert" aria-live="assertive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span></span>
      </p>

      <!-- Botón de Login -->
      <button type="submit" id="btn-login" class="btn btn-primary">
        <span class="btn-text">Entrar</span>
        <div class="btn-loader" aria-hidden="true"></div>
      </button>

    </form><!-- /login-form -->

  </main><!-- /login-card -->

  <!-- ── Scripts ── -->
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <!-- Configuración de Firebase -->
  <script src="assets/js/firebase-config.js"></script>

  <!-- Lógica de autenticación -->
  <script src="assets/js/auth.js"></script>

  <!-- Toggle de visibilidad de contraseña (script inline mínimo) -->
  <script>
    (function () {
      const btn   = document.getElementById('toggle-password');
      const input = document.getElementById('password');
      if (!btn || !input) return;

      btn.addEventListener('click', () => {
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');

        // Intercambia el ícono
        const icon = document.getElementById('eye-icon');
        if (icon) {
          icon.innerHTML = isPassword
            ? /* ojo cerrado */
              `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
               <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
               <line x1="1" y1="1" x2="23" y2="23"/>`
            : /* ojo abierto */
              `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
               <circle cx="12" cy="12" r="3"/>`;
        }
      });
    })();
  </script>

</body>
</html>
